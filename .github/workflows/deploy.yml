name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test
      - id: deploy
        env:
          DEPLOY_URL: https://example.com
        run: |
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "Deploy URL: ${DEPLOY_URL}" >> "$GITHUB_STEP_SUMMARY"
